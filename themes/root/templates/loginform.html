<script>
  thisElement.addEventListener('submit', function(event) {
    event.preventDefault();
    var myReturn=Node.dom.checkValidData({properties: {user_name: this.elements.user_name.value, user_password: this.elements.user_password.value}});
    if (myReturn.error) {
      //Errors in characters
      if (myReturn.errorKey=="user_name") myalert.properties.alertmsg=this.elements.userCharError.value;
      else if (myReturn.errorKey=="user_password") myalert.properties.alertmsg=this.elements.pwdCharError.value;
      if (this.elements[myReturn.errorKey]) this.elements[myReturn.errorKey].focus();
      myalert.properties.timeout=3000;
      myalert.showalert();
      return false;
    }
    var storeChecked=thisElement.elements.rememberme.checked;
    var uname=thisElement.elements.user_name.value;
    var upass=thisElement.elements.user_password.value;
    webuser.login(uname, upass)
    .then(()=> {
      myalert.properties.alertmsg=thisElement.elements.loginOk.value;
      myalert.properties.timeout=3000;
      myalert.showalert();
      if (storeChecked) {
        localStorage.setItem("user_name", uname);
        localStorage.setItem("user_password", upass);
      }
      else {
        if (localStorage.getItem("user_name")) localStorage.removeItem("user_name");
      }
      Node.setViewNew(document.getElementById('centralcontent'), 'loggedindata');
    })
    .catch(error => {
      myalert.properties.alertmsg=thisElement.elements[error.errorMessage].value;
      myalert.properties.timeout=3000;
      myalert.showalert();
    });
  });
</script>
