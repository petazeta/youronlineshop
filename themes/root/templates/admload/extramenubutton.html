<!-- Extra menus buttons -->
<div class="space"></div>
<span data-note="relative position container for admn buttons" style="position:relative;">
  <div data-id="butedit" class="btmiddleright"></div>
  <a href="javascript:" class="minibtn"></a>
  <script>
    var myTxtNode=thisNode.getRelationship("domelementsdata").getChild();
    myTxtNode.writeProperty(thisElement);
    //adding the edition pencil
    if (webuser.isWebAdmin()) {
      Node.dom.visibleOnMouseOver({element: thisElement.parentElement.querySelector('[data-id=butedit]'), parent: thisElement.parentElement});
      myTxtNode.appendView(thisElement.parentElement.querySelector('[data-id=butedit]'), "butedit", {editElement: thisElement});
    }
    thisElement.onclick=function(){
      thisNode.setView(document.getElementById("centralcontent"), thisParams.template);
      return false;
    }
  </script>
</span>
