<script>
  thisElement.addEventListener("submit", function(e) {
    e.preventDefault();

    var myReturn=Node.dom.checkValidData({properties: {user_name: this.elements.user_name.value, user_password: this.elements.user_password.value}});
    if (myReturn.error) {
      //Errors in characters
      if (myReturn.errorKey=="user_name") myalert.properties.alertmsg=this.elements.userCharError.value;
      else if (myReturn.errorKey=="user_password") myalert.properties.alertmsg=this.elements.pwdCharError.value;
      if (this.elements[myReturn.errorKey]) this.elements[myReturn.errorKey].focus();
      myalert.properties.timeout=3000;
      myalert.showalert();
      return false;
    }
    webuser.create(thisElement.elements.user_name.value, thisElement.elements.user_password.value)
    .then(myNode =>{
      myalert.properties.alertmsg=thisElement.elements.signedIn.value;
      myalert.properties.timeout=3000;
      myalert.showalert();
      Node.setViewNew(document.getElementById('centralcontent'), 'loggedindata');
    })
    .catch(error=>{
      myalert.properties.alertmsg=thisElement.elements[myNode.errorMessage].value;
      myalert.properties.timeout=3000;
      myalert.showalert();
    });
  });
</script>
